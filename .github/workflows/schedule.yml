name: DouYin Spark Flow Schedule Run

on:
  workflow_dispatch:
  schedule:
    - cron: "30,35,40,45 0 * * *"
      timezone: "Asia/Shanghai"
    - cron: "36,41,46,51 8 * * *"
      timezone: "Asia/Shanghai"
    - cron: "15,20,25,30 9 * * *"
      timezone: "Asia/Shanghai"
    - cron: "26,31,36,41 14 * * *"
      timezone: "Asia/Shanghai"
    - cron: "50,55 18 * * *"
      timezone: "Asia/Shanghai"
    - cron: "0,5 19 * * *"
      timezone: "Asia/Shanghai"
    - cron: "14,19,24,29 20 * * *"
      timezone: "Asia/Shanghai"
    - cron: "23,28,33,38 21 * * *"
      timezone: "Asia/Shanghai"
    - cron: "36,41,46,51 22 * * *"
      timezone: "Asia/Shanghai"
    - cron: "41,46,51,56 23 * * *"
      timezone: "Asia/Shanghai"

permissions:
  actions: read
  contents: read

concurrency:
  group: douyin-spark-flow-schedule
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.slot.outputs.go }}
    steps:
      - id: slot
        uses: actions/github-script@v7
        with:
          script: |
            const t=['00:30','08:36','09:15','14:26','18:50','20:14','21:23','22:36','23:41'],g=20,w='schedule.yml',b='main';
            if(context.eventName==='workflow_dispatch'){core.setOutput('go','true');return}
            const n=new Date(Date.now()+8*36e5),m=n.getUTCHours()*60+n.getUTCMinutes(),y=n.getUTCFullYear(),M=n.getUTCMonth(),d=n.getUTCDate();
            const s=t.map(x=>{const[a,c]=x.split(':').map(Number);return{x,a,c,r:m-a*60-c}}).filter(x=>x.r>=0&&x.r<=g).sort((x,y)=>x.r-y.r)[0];
            if(!s){core.setOutput('go','false');return}
            const A=new Date(Date.UTC(y,M,d,s.a-8,s.c)),B=new Date(A.getTime()+g*6e4);
            const rs=await github.paginate(github.rest.actions.listWorkflowRuns,{owner:context.repo.owner,repo:context.repo.repo,workflow_id:w,branch:b,per_page:100});
            const ok=!rs.find(r=>r.id!==context.runId&&new Date(r.created_at)>=A&&new Date(r.created_at)<=B);
            core.notice(ok?`run ${s.x}`:`skip ${s.x}`);
            core.setOutput('go',String(ok));

  run-main:
    needs: guard
    if: needs.guard.outputs.go == 'true'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: curl -I https://creator.douyin.com/
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: playwright install chromium --with-deps --only-shell
      - env:
          VARS_JSON: ${{ toJson(vars) }}
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: python utils/export_github_env.py
      - run: python main.py
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: run-logs
          path: logs/

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
