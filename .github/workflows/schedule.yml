name: DouYin Spark Flow Schedule Run

on:
  workflow_dispatch:
  schedule:
    - cron: "30,35,40,45 0 * * *"
      timezone: "Asia/Shanghai"
    - cron: "36,41,46,51 8 * * *"
      timezone: "Asia/Shanghai"
    - cron: "15,20,25,30 9 * * *"
      timezone: "Asia/Shanghai"
    - cron: "26,31,36,41 14 * * *"
      timezone: "Asia/Shanghai"
    - cron: "50,55 18 * * *"
      timezone: "Asia/Shanghai"
    - cron: "1,6 19 * * *"
      timezone: "Asia/Shanghai"
    - cron: "14,19,24,29 20 * * *"
      timezone: "Asia/Shanghai"
    - cron: "23,28,33,38 21 * * *"
      timezone: "Asia/Shanghai"
    - cron: "36,41,46,51 22 * * *"
      timezone: "Asia/Shanghai"
    - cron: "41,46,51,56 23 * * *"
      timezone: "Asia/Shanghai"

permissions:
  actions: read
  contents: read

concurrency:
  group: douyin-spark-flow-schedule
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.slot.outputs.go }}
    steps:
      - id: slot
        uses: actions/github-script@v8
        with:
          script: |
            const slots = [
              { label: '00:30', minute: 30, schedules: ['30,35,40,45 0 * * *'] },
              { label: '08:36', minute: 8 * 60 + 36, schedules: ['36,41,46,51 8 * * *'] },
              { label: '09:15', minute: 9 * 60 + 15, schedules: ['15,20,25,30 9 * * *'] },
              { label: '14:26', minute: 14 * 60 + 26, schedules: ['26,31,36,41 14 * * *'] },
              { label: '18:50', minute: 18 * 60 + 50, schedules: ['50,55 18 * * *', '1,6 19 * * *'] },
              { label: '20:14', minute: 20 * 60 + 14, schedules: ['14,19,24,29 20 * * *'] },
              { label: '21:23', minute: 21 * 60 + 23, schedules: ['23,28,33,38 21 * * *'] },
              { label: '22:36', minute: 22 * 60 + 36, schedules: ['36,41,46,51 22 * * *'] },
              { label: '23:41', minute: 23 * 60 + 41, schedules: ['41,46,51,56 23 * * *'] },
            ];
            const scheduleMap = new Map(
              slots.flatMap((slot, index) => slot.schedules.map((schedule) => [schedule, { ...slot, index }]))
            );

            if (context.eventName === 'workflow_dispatch') {
              core.notice('manual dispatch');
              core.setOutput('go', 'true');
              return;
            }

            const firedSchedule = context.payload.schedule;
            const slot = scheduleMap.get(firedSchedule);
            if (!slot) {
              core.warning(`unknown schedule: ${firedSchedule ?? 'none'}`);
              core.setOutput('go', 'false');
              return;
            }

            const now = new Date();
            const nowShanghai = new Date(now.getTime() + 8 * 60 * 60 * 1000);
            const hour = Math.floor(slot.minute / 60);
            const minute = slot.minute % 60;
            let windowStart = new Date(
              Date.UTC(
                nowShanghai.getUTCFullYear(),
                nowShanghai.getUTCMonth(),
                nowShanghai.getUTCDate(),
                hour - 8,
                minute
              )
            );
            if (windowStart.getTime() > now.getTime()) {
              windowStart = new Date(windowStart.getTime() - 24 * 60 * 60 * 1000);
            }

            const nextSlot = slots[(slot.index + 1) % slots.length];
            const gapMinutes = (nextSlot.minute - slot.minute + 24 * 60) % (24 * 60) || 24 * 60;
            const windowEnd = new Date(windowStart.getTime() + gapMinutes * 60 * 1000);
            if (now.getTime() >= windowEnd.getTime()) {
              core.notice(`skip stale slot ${slot.label}`);
              core.setOutput('go', 'false');
              return;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'schedule.yml',
              branch: 'main',
              per_page: 100,
              event: 'schedule',
            });
            const duplicated = runs.find((run) => {
              if (run.id === context.runId) return false;
              const createdAt = new Date(run.created_at);
              return createdAt >= windowStart && createdAt < windowEnd;
            });
            if (duplicated) {
              core.notice(`skip duplicate for ${slot.label}, existing run ${duplicated.id}`);
              core.setOutput('go', 'false');
              return;
            }

            core.notice(`run ${slot.label} from ${firedSchedule}`);
            core.setOutput('go', 'true');

  run-main:
    needs: guard
    if: needs.guard.outputs.go == 'true'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: curl -I https://creator.douyin.com/
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: playwright install chromium --with-deps --only-shell
      - env:
          VARS_JSON: ${{ toJson(vars) }}
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: python utils/export_github_env.py
      - run: python main.py
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: run-logs
          path: logs/

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
